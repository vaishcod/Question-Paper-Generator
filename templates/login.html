<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        .navbar {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .navbar .title span {
            color: var(--accent);
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .navbar ul li a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .navbar ul li a:hover {
            color: var(--primary);
            background-color: #F1F5F9;
        }


        .page-content {
            max-width: 420px;
            margin: 40px auto;
            background: white;
            padding: 24px;
            border-radius: 5px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="title">🏛️ Global University <span>Portal</span></div>
        <ul>
            <li><a href="/login">Login</a></li>
            <li><a href="/signup">Sign Up</a></li>
        </ul>
    </div>

    <div class="page-content">
    <h2>Login</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Login</button>
    </form>

    </div>

    <script>
        (function configureNavbar() {
            const isAuthenticated = "{{ 'true' if nav_is_authenticated else 'false' }}" === "true";
            const canManageUsers = "{{ 'true' if nav_can_manage_users else 'false' }}" === "true";

            document.querySelectorAll("[data-nav='auth']").forEach((item) => {
                item.style.display = isAuthenticated ? "" : "none";
            });
            document.querySelectorAll("[data-nav='guest']").forEach((item) => {
                item.style.display = isAuthenticated ? "none" : "";
            });
            document.querySelectorAll("[data-nav='manage']").forEach((item) => {
                item.style.display = canManageUsers ? "" : "none";
            });
        })();
    </script>
</body>
</html>
